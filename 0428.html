<!DOCTYPE html>
<html>

<head>

<title>jQuery Basic</title>

<script src="https://code.jquery.com/jquery-3.6.4.js"></script>

<script>

// 이벤트를 연결합니다.
$(document).ready(function () {

    // 키보드 이벤트를 연결합니다.
    $(document).keydown(function (event) {

        // Enter 키를 눌렀을 때 (keyCode: 13)
        if (event.keyCode == 13) {

            // 현재 시각을 구합니다.
            var now = new Date();

            // 화면에 출력합니다.
            $('h1').html('Hello World<br>' + now.toLocaleString());
        }

    });

});

</script>

</head>

<body>

<h1>Enter 키를 누르세요</h1>

</body>

</html>
